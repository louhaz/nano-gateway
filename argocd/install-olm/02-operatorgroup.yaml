apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: argocd-operatorgroup
  namespace: argocd
spec:
  # An empty targetNamespaces list means the operator watches ALL namespaces
  # (cluster-scoped OperatorGroup). This is required for the ArgoCD operator
  # to be able to manage an ArgoCD instance that targets all namespaces.
  targetNamespaces: []
