apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    # IBM Cloud Kubernetes Service public ingress class
    kubernetes.io/ingress.class: "public-iks-k8s-nginx"
    # ArgoCD server handles TLS termination itself; pass through to port 443
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    # Larger proxy buffer avoids header-too-large errors with JWT tokens
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
spec:
  ingressClassName: public-iks-k8s-nginx
  rules:
    - host: argocd.mycluster-eu-de-1-bxf-8x3-e7d3d93b8b317d269525bf063b24f98d-0000.eu-de.containers.appdomain.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 443
  tls:
    - hosts:
        - argocd.mycluster-eu-de-1-bxf-8x3-e7d3d93b8b317d269525bf063b24f98d-0000.eu-de.containers.appdomain.cloud
      # The argocd-operator creates this secret automatically; leave the name as-is.
      secretName: argocd-server-tls
