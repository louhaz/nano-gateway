apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: argocd-operator
  namespace: argocd
spec:
  # "alpha" is the channel published by the community-operators catalog for
  # the argocd-operator. It tracks the latest available version.
  channel: alpha
  # Install the latest version automatically; set installPlanApproval to
  # "Manual" if you want gate-controlled upgrades.
  installPlanApproval: Automatic
  name: argocd-operator
  # Source is the OLM CatalogSource that ships with the standard IBM IKS
  # OLM installation (operatorhubio-catalog in the olm namespace).
  source: operatorhubio-catalog
  sourceNamespace: olm
