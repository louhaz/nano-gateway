apiVersion: argoproj.io/v1alpha1
kind: ArgoCD
metadata:
  name: argocd
  namespace: argocd
spec:
  # ── Application Controller ───────────────────────────────────────────────
  # Allow the application-controller to reconcile resources in every
  # namespace on the cluster (all-namespace management).
  applicationSet:
    enabled: true

  # ── Server ───────────────────────────────────────────────────────────────
  server:
    # Expose the gRPC/HTTP service; Ingress is defined separately in
    # 06-ingress.yaml.
    insecure: false
    service:
      type: ClusterIP

  # ── RBAC ─────────────────────────────────────────────────────────────────
  rbac:
    # Default policy: any authenticated user is a read-only viewer.
    # Promote to role:admin only through explicit policy rules.
    defaultPolicy: "role:readonly"
    policy: |
      g, system:cluster-admins, role:admin
    scopes: "[groups]"

  # ── SSO / Dex ─────────────────────────────────────────────────────────────
  # Dex is disabled; configure your own OIDC provider as needed.
  dex:
    openShiftOAuth: false

  # ── Resource Customisations ───────────────────────────────────────────────
  # Teach ArgoCD how to determine health for OLM resources so that sync
  # waves work correctly when operators are being installed alongside apps.
  resourceHealthChecks:
    - group: operators.coreos.com
      kind: Subscription
      check: |
        hs = {}
        if obj.status ~= nil then
          if obj.status.state ~= nil then
            if obj.status.state == "AtLatestKnown" then
              hs.status = "Healthy"
              hs.message = obj.status.state .. " - " .. (obj.status.currentCSV or "")
              return hs
            end
            if obj.status.state == "UpgradePending" or obj.status.state == "Installing" then
              hs.status = "Progressing"
              hs.message = obj.status.state
              return hs
            end
          end
        end
        hs.status = "Degraded"
        hs.message = "Subscription is in an unknown state"
        return hs
    - group: operators.coreos.com
      kind: InstallPlan
      check: |
        hs = {}
        if obj.status ~= nil then
          if obj.status.phase ~= nil then
            if obj.status.phase == "Complete" then
              hs.status = "Healthy"
              hs.message = obj.status.phase
              return hs
            end
            if obj.status.phase == "Installing" then
              hs.status = "Progressing"
              hs.message = obj.status.phase
              return hs
            end
          end
        end
        hs.status = "Degraded"
        hs.message = "InstallPlan is in an unknown state"
        return hs

  # ── Resource Tracking ────────────────────────────────────────────────────
  # annotation is the default and the safest choice for vanilla Kubernetes.
  resourceTrackingMethod: annotation
