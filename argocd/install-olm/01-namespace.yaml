apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    # Ensure OLM can target this namespace
    kubernetes.io/metadata.name: argocd
    # Opt the argocd namespace into the argocd instance's own management
    # (the ArgoCD operator watches namespaces with this label)
    argocd.argoproj.io/managed-by-cluster-argocd: "true"
